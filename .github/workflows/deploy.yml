name: Deploy dashboard to VPS

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-domaindata-dashboard
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync dashboard to VPS
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' --exclude='.next' --exclude='.vercel' \
            --exclude='.env.local' \
            --exclude='*.log' --exclude='*.bak*' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=20" \
            ./dashboard/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/domaindata/dashboard/"

      - name: Build & restart on VPS
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'cd /opt/n8n && docker compose build dashboard && docker compose up -d dashboard && docker image prune -f'
